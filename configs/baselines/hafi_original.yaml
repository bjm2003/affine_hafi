# HAFI baseline reproduction config
# Purpose: reproduce 师姐 HAFI on self-built Env (Gate G1)
# Expected SR at L1/L2/L3: ~93.8% / ~91.8% / ~83.0%

method:
  name: hafi_baseline
  action_type: hafi_3d            # 3D (dx, dy, scale)
  enable_projection: false
  formation_entropy_weight: 0.0

env:
  n_vehicles: 3
  d_form: 0.8
  scenario_probs:
    open: 0.30
    corridor: 0.20
    s_corridor: 0.15
    z_corridor: 0.15
    u_trap: 0.00           # unsolvable for isotropic HAFI → excluded from baseline TRAINING
    dynamic: 0.20

ppo:
  total_timesteps: 1_500_000      # HAFI paper reports 1.5M
  n_envs: 12
  n_steps: 8192
  batch_size: 2048
  n_epochs: 4
  lr: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01

curriculum:
  enabled: true
  # scenario order: [open, corridor, s_corridor, z_corridor, u_trap, dynamic]
  # u_trap slot (index 4) held at 0.0: isotropic HAFI cannot back out of a U-trap,
  # so it is UNSOLVABLE for the baseline. It stays in EVAL (L3) as the affine
  # killer-scenario motivator, but training on it only injects unlearnable episodes.
  phase1_probs: [0.50, 0.15, 0.10, 0.10, 0.00, 0.15]
  phase2_probs: [0.20, 0.20, 0.20, 0.20, 0.00, 0.20]
  switch_step: 500_000
  corridor_gap_start: 1.0
  corridor_gap_target: 0.70
  corridor_gap_warmup_frac: 0.05
  corridor_gap_anneal_frac: 0.40

failure_replay:
  enabled: false           # DISABLED for baseline repro: SR-EMA reweighting pinned the
                           # unsolvable u_trap at max_prob and starved solved scenarios
                           # (open/dynamic crushed to ~3% of episodes → Gate G1 miss).
  max_prob: 0.3
  sr_low: 0.5
  sr_high: 0.8
  buffer_size: 200

logging:
  wandb: true
  wandb_project: affine_hafi
  wandb_entity:                    # 留空=用登录账号默认 entity；填错的 entity 会 CommError
  eval_freq: 50_000
  video_freq: 100_000
  checkpoint_freq: 100_000
