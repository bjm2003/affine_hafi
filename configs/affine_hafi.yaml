# Main method config: Affine Formation Manifold (Direction A)
# Loaded by train/train.py

method:
  name: affine_hafi
  action_type: affine_6d          # 6D (dx, dy, theta, s_x, s_y, kappa)

  # Affine action bounds (see policies/affine_policy.py::decode_affine_action)
  affine_theta_max: 1.5708        # ±90° rotation
  affine_kappa_max: 0.5           # shear coefficient bound
  # s_x, s_y bounds inherit from config.s_min / s_max

  # Feasibility-preserving projection (C2): minimal isotropic contraction of the
  # affine formation until every per-vehicle reference clears obstacles + arena.
  enable_projection: true
  projection_clearance: 0.05      # extra margin (m) on top of d_safe
  projection_gamma_min: 0.2       # floor on contraction (prevents collapse to a point)
  projection_gamma_steps: 6       # line-search grid resolution

  # Emergent regularization (C3 fallback)
  formation_entropy_weight: 0.0   # start at 0, enable if collapse observed

# Environment
env:
  n_vehicles: 3
  d_form: 0.8
  scenario_probs:                 # 6 类 (matches config.train_scenario_probs)
    open: 0.25
    corridor: 0.15
    s_corridor: 0.20         # ← affine advantage (curved narrow passage)
    z_corridor: 0.20         # ← affine advantage (asymmetric passage)
    u_trap: 0.00             # EXCLUDED from training: even a PRIVILEGED affine
                             # controller scores 0% (u_trap_affine_probe.py) —
                             # escaping a concave dead-end is a detour/PLANNING
                             # problem in the shared (dx,dy) heading, NOT a shape
                             # DOF. Training it only feeds unlearnable episodes and
                             # lets failure_replay pin max_prob onto it (poisons
                             # open/dynamic). It is NOT an affine killer scenario.
    dynamic: 0.20

# PPO hyperparams (aligned with HAFI config.py)
ppo:
  total_timesteps: 3_000_000
  n_envs: 12
  n_steps: 8192
  batch_size: 2048
  n_epochs: 4
  lr: 3e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01

# Curriculum (matches config.py fields)
curriculum:
  enabled: true
  # scenario order: [open, corridor, s_corridor, z_corridor, u_trap, dynamic]
  # u_trap slot (index 4) held at 0.0 — unsolvable by BOTH methods (see scenario_probs).
  # Late phase emphasizes s/z_corridor: the curved/asymmetric passages where affine
  # deformation (shear/rotate/anisotropic squeeze) beats isotropic scaling.
  phase1_probs: [0.50, 0.10, 0.10, 0.10, 0.00, 0.20]
  phase2_probs: [0.15, 0.15, 0.25, 0.25, 0.00, 0.20]
  switch_step: 500_000
  corridor_gap_start: 1.0
  corridor_gap_target: 0.70
  corridor_gap_warmup_frac: 0.05
  corridor_gap_anneal_frac: 0.40

# Failure replay
failure_replay:
  enabled: true
  max_prob: 0.3
  sr_low: 0.5
  sr_high: 0.8
  buffer_size: 200

# Logging
logging:
  wandb: true
  wandb_project: affine_hafi
  wandb_entity:                           # 留空=用登录账号默认 entity；填错会 CommError
  eval_freq: 50_000
  video_freq: 100_000
  checkpoint_freq: 100_000
